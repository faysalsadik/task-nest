<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="description" content="Minimal floating todo app">
    <title>Tasky</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --card: #111214;
            --card-hover: #1a1a1a;
            --border: #2a2a2a;
            --text: #b0b0b0;
            --text-muted: #888888;
            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --success: #ffffff;
            --warning: #bbbbbb;
            --danger: #ffffff;
            --pin-active: #ffffff;
            --pin-inactive: #555555;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
            border: none;
            outline: none;
            -webkit-app-region: no-drag;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: var(--bg);
            border: none;
            outline: none;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .titlebar {
            height: 36px;
            background: var(--bg);
            display: flex;
            align-items: center;
            padding: 0 8px;
            -webkit-app-region: drag;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .titlebar-right {
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-app-region: no-drag;
        }

        .app-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .titlebar-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: var(--text-muted);
        }

        .titlebar-btn:hover {
            background: var(--card);
        }

        .titlebar-btn.pin {
            color: var(--pin-inactive);
        }

        .titlebar-btn.pin.active {
            color: var(--pin-active);
        }

        .titlebar-btn.auto-start.active {
            color: var(--accent);
        }

        .titlebar-btn#autoStartBtn {
            transition: all 0.2s;
        }

        .titlebar-btn.close:hover {
            background: var(--danger);
            color: white;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 8px;
            min-height: 0;
            height: 100%;
            box-sizing: border-box;
        }

        .input-area {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        .task-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .task-input:focus {
            border-color: var(--accent);
        }

        .task-input::placeholder {
            color: var(--text-muted);
        }

.btn-add {
            padding: 10px 14px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-add:hover {
            background: #333333;
        }

        .btn-add-subtask {
            padding: 4px 6px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add-subtask:hover {
            background: #333333;
        }

        .btn-add-tag {
            padding: 4px 10px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-add-tag:hover {
            background: #333333;
        }

        .btn-add:hover {
            background: #555555;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
            height: 100%;
        }

        .task-list::-webkit-scrollbar {
            width: 4px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .task-card {
            background: var(--card);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.15s;
        }

        .task-card:hover {
            background: var(--card-hover);
        }

        .task-card.completed {
            opacity: 0.5;
        }

        .task-main {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 10px;
        }

        .checkbox {
            position: relative;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .checkbox input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 18px;
            height: 18px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 3px;
            transition: all 0.15s;
        }

.checkbox input:checked ~ .checkmark {
            background: #333333;
            border-color: #333333;
        }

        .subtask-item input:checked ~ .checkmark {
            background: #333333;
            border-color: #333333;
        }

        .checkmark::after {
            content: '';
            position: absolute;
            display: none;
            left: 5px;
            top: 1px;
            width: 4px;
            height: 7px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox input:checked ~ .checkmark::after {
            display: block;
        }

        .task-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }

        .tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #404040;
            border: 1px solid #555555;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tag-remove {
            width: 12px;
            height: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888888;
            padding: 0;
            border-radius: 2px;
        }

        .tag-remove:hover {
            background: #333333;
            color: #ffffff;
        }

        .add-tag-group {
            display: flex;
            gap: 4px;
            align-items: center;
            max-width: 160px;
        }

        .tag-input {
            width: 80px;
            padding: 4px 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.7rem;
            font-family: inherit;
            outline: none;
        }

        .tag-input:focus {
            border-color: var(--accent);
        }

        .tag-input::placeholder {
            color: var(--text-muted);
        }

        .meta-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-add-tag {
            padding: 4px 10px;
            background: #404040;
            border: 1px solid #555555;
            border-radius: 4px;
            color: #ffffff;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-add-tag:hover {
            background: #555555;
        }

        .deadline-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--border);
            color: var(--text-muted);
            white-space: nowrap;
        }

        .deadline-badge.soon {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .deadline-badge.overdue {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .deadline-badge.today {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .task-expand {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .task-expand:hover {
            background: var(--border);
        }

        .task-expand svg {
            transition: transform 0.2s;
        }

        .task-expand.expanded svg {
            transform: rotate(180deg);
        }

        .task-delete {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            opacity: 0;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .task-card:hover .task-delete {
            opacity: 1;
        }

        .task-delete:hover {
            background: var(--danger);
            color: white;
        }

        .task-details {
            display: none;
            padding: 0 12px 12px;
        }

        .task-details.visible {
            display: block;
        }

        .details-textarea {
            width: 100%;
            min-height: 60px;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
        }

        .details-textarea:focus {
            border-color: var(--accent);
        }

        .details-textarea::placeholder {
            color: var(--text-muted);
        }

        .deadline-input-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deadline-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .deadline-input {
            padding: 6px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.75rem;
            font-family: inherit;
            outline: none;
        }

        .deadline-input:focus {
            border-color: var(--accent);
        }

        .subtasks-section {
            margin-top: 10px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .subtasks-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .subtask-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: var(--bg);
            border-radius: 4px;
        }

        .subtask-item .checkbox {
            width: 16px;
            height: 16px;
        }

        .subtask-item .checkmark {
            width: 16px;
            height: 16px;
        }

        .subtask-item input:checked ~ .checkmark {
            background: #666666;
            border-color: #666666;
        }

        .subtask-item .checkmark::after {
            left: 4px;
            top: 1px;
            width: 3px;
            height: 6px;
        }

        .subtask-title {
            flex: 1;
            font-size: 0.8rem;
        }

        .subtask-item.completed .subtask-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .subtask-deadline {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: var(--border);
            color: var(--text-muted);
        }

        .subtask-deadline.soon {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .subtask-deadline.overdue {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .subtask-deadline.today {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .subtask-delete {
            width: 20px;
            height: 20px;
            border: none;
            background: transparent;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            opacity: 0;
            transition: all 0.15s;
        }

        .subtask-item:hover .subtask-delete {
            opacity: 1;
        }

        .subtask-delete:hover {
            background: var(--danger);
            color: white;
        }

        .subtask-expand {
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            opacity: 0;
            transition: all 0.15s;
        }

        .subtask-item:hover .subtask-expand {
            opacity: 1;
        }

        .subtask-expand:hover {
            background: var(--border);
        }

        .subtask-expand svg {
            transition: transform 0.2s;
        }

        .subtask-expand.expanded svg {
            transform: rotate(180deg);
        }

        .subtask-details {
            padding: 0 8px 8px 32px;
        }

        .subtask-details-textarea {
            min-height: 50px;
            font-size: 0.75rem;
        }

        .add-subtask-group {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .subtask-input {
            flex: 1;
            padding: 6px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-size: 0.75rem;
            font-family: inherit;
            outline: none;
        }

        .subtask-input:focus {
            border-color: var(--accent);
        }

        .subtask-input::placeholder {
            color: var(--text-muted);
        }

        .btn-add-subtask {
            padding: 4px 6px;
            background: #404040;
            border: 1px solid #555555;
            border-radius: 4px;
            color: #ffffff;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add-subtask:hover {
            background: #555555;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 8px;
        }

        .empty-state svg {
            width: 32px;
            height: 32px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-left">
            <span class="app-title">Tasky</span>
        </div>
        <div class="titlebar-right">
            <button class="titlebar-btn pin" id="pinBtn" title="Toggle always on top">
                <svg id="pinIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                </svg>
            </button>
            <button class="titlebar-btn" id="autoStartBtn" title="Toggle auto start">
                <svg id="autoStartIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
            </button>
            <button class="titlebar-btn" id="minimizeBtn" title="Minimize">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button class="titlebar-btn close" id="closeBtn" title="Close">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="input-area">
            <input type="text" class="task-input" id="taskInput" placeholder="Add a task..." onkeypress="if(event.key==='Enter')addTask()">
        </div>
        <div class="task-list" id="taskList"></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('taskyData')) || { tasks: [] };
        let isPinned = localStorage.getItem('taskyPinned') !== 'false';

        function saveData() {
            localStorage.setItem('taskyData', JSON.stringify(data));
        }

        function updatePinUI() {
            const pinBtn = document.getElementById('pinBtn');
            const pinIcon = document.getElementById('pinIcon');
            if (isPinned) {
                pinBtn.classList.add('active');
                pinBtn.title = 'Unpin window';
                if (pinIcon) {
                    pinIcon.innerHTML = '<path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/>';
                }
            } else {
                pinBtn.classList.remove('active');
                pinBtn.title = 'Pin window';
                if (pinIcon) {
                    pinIcon.innerHTML = '<path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/>';
                }
            }
        }

        function formatDeadline(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const deadline = new Date(date);
            deadline.setHours(0, 0, 0, 0);

            const diff = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

            if (diff < 0) return { text: 'Overdue', class: 'overdue' };
            if (diff === 0) return { text: 'Today', class: 'today' };
            if (diff <= 3) return { text: date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), class: 'soon' };
            return { text: date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), class: '' };
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            if (!title) return;

            data.tasks.unshift({
                id: Date.now(),
                title,
                details: '',
                deadline: '',
                tags: [],
                completed: false,
                expanded: false,
                subtasks: []
            });
            input.value = '';
            saveData();
            render();
        }

        function toggleTask(id) {
            const task = data.tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveData();
                render();
            }
        }

        function deleteTask(id) {
            data.tasks = data.tasks.filter(t => t.id !== id);
            saveData();
            render();
        }

        function toggleExpand(id) {
            const task = data.tasks.find(t => t.id === id);
            if (task) {
                task.expanded = !task.expanded;
                saveData();
                render();
            }
        }

        function updateTaskDetails(id, field, value) {
            const task = data.tasks.find(t => t.id === id);
            if (task) {
                task[field] = value;
                saveData();
            }
        }

        function addSubtask(taskId) {
            const input = document.getElementById(`subtask-input-${taskId}`);
            if (!input) return;
            const title = input.value.trim();
            if (!title) return;

            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                task.subtasks.push({
                    id: Date.now(),
                    title,
                    details: '',
                    deadline: '',
                    tags: [],
                    completed: false,
                    expanded: false
                });
                input.value = '';
                saveData();
                render();
            }
        }

        function toggleSubtask(taskId, subtaskId) {
            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                const subtask = task.subtasks.find(s => s.id === subtaskId);
                if (subtask) {
                    subtask.completed = !subtask.completed;
                    saveData();
                    render();
                }
            }
        }

        function deleteSubtask(taskId, subtaskId) {
            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                task.subtasks = task.subtasks.filter(s => s.id !== subtaskId);
                saveData();
                render();
            }
        }

        function toggleSubtaskExpand(taskId, subtaskId) {
            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                const subtask = task.subtasks.find(s => s.id === subtaskId);
                if (subtask) {
                    subtask.expanded = !subtask.expanded;
                    saveData();
                    render();
                }
            }
        }

        function updateSubtaskDetails(taskId, subtaskId, field, value) {
            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                const subtask = task.subtasks.find(s => s.id === subtaskId);
                if (subtask) {
                    subtask[field] = value;
                    saveData();
                }
            }
        }

        function addTag(taskId, isSubtask = false, subtaskId = null) {
            const input = document.getElementById(`tag-input-${taskId}${isSubtask ? '-' + subtaskId : ''}`);
            if (!input) return;
            const tag = input.value.trim();
            if (!tag) return;

            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                if (isSubtask && subtaskId !== null) {
                    const subtask = task.subtasks.find(s => s.id === subtaskId);
                    if (subtask) {
                        if (!subtask.tags) subtask.tags = [];
                        if (!subtask.tags.includes(tag)) {
                            subtask.tags.push(tag);
                            input.value = '';
                            saveData();
                            render();
                        }
                    }
                } else {
                    if (!task.tags) task.tags = [];
                    if (!task.tags.includes(tag)) {
                        task.tags.push(tag);
                        input.value = '';
                        saveData();
                        render();
                    }
                }
            }
        }

        function removeTag(taskId, tag, isSubtask = false, subtaskId = null) {
            const task = data.tasks.find(t => t.id === taskId);
            if (task) {
                if (isSubtask && subtaskId !== null) {
                    const subtask = task.subtasks.find(s => s.id === subtaskId);
                    if (subtask && subtask.tags) {
                        subtask.tags = subtask.tags.filter(t => t !== tag);
                        saveData();
                        render();
                    }
                } else {
                    if (task.tags) {
                        task.tags = task.tags.filter(t => t !== tag);
                        saveData();
                        render();
                    }
                }
            }
        }

        function render() {
            const list = document.getElementById('taskList');

            if (data.tasks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <p>No tasks yet</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = data.tasks.map(task => {
                const deadlineInfo = formatDeadline(task.deadline);
                const subtasksHtml = task.subtasks.map(st => {
                    const stDeadline = formatDeadline(st.deadline);
                    return `
                        <div class="subtask-item ${st.completed ? 'completed' : ''}">
                            <label class="checkbox">
                                <input type="checkbox" ${st.completed ? 'checked' : ''} onchange="toggleSubtask(${task.id}, ${st.id})">
                                <span class="checkmark"></span>
                            </label>
                            <span class="subtask-title">${escapeHtml(st.title)}</span>
                            ${stDeadline ? `<span class="subtask-deadline ${stDeadline.class}">${stDeadline.text}</span>` : ''}
                            <button class="subtask-expand ${st.expanded ? 'expanded' : ''}" onclick="toggleSubtaskExpand(${task.id}, ${st.id})">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <button class="subtask-delete" onclick="deleteSubtask(${task.id}, ${st.id})">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        ${st.expanded ? `
                            <div class="subtask-details">
                                <textarea class="details-textarea subtask-details-textarea" placeholder="Add details..."
                                    onchange="updateSubtaskDetails(${task.id}, ${st.id}, 'details', this.value)">${escapeHtml(st.details || '')}</textarea>
                                <div class="meta-row">
                                <div class="deadline-input-group">
                                    <span class="deadline-label">Due:</span>
                                    <input type="date" class="deadline-input" value="${st.deadline || ''}"
                                        onchange="updateSubtaskDetails(${task.id}, ${st.id}, 'deadline', this.value)">
                                </div>
                                <div class="add-tag-group">
                                    <input type="text" class="tag-input" id="tag-input-${task.id}-${st.id}" placeholder="Add tag..."
                                        onkeypress="if(event.key==='Enter'){event.preventDefault();addTag(${task.id}, true, ${st.id})}">
                                </div>
                            </div>
                            ${st.tags && st.tags.length > 0 ? `
                                <div class="task-tags" style="margin-top:6px;">
                                    ${st.tags.map(tag => `
                                        <span class="tag">
                                            ${escapeHtml(tag)}
                                            <button class="tag-remove" onclick="removeTag(${task.id}, '${escapeHtml(tag)}', true, ${st.id})">
                                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                                </svg>
                                            </button>
                                        </span>
                                    `).join('')}
                                </div>
                            ` : ''}
                            </div>
                        ` : ''}
                    `;
                }).join('');

                return `
                    <div class="task-card ${task.completed ? 'completed' : ''}">
                        <div class="task-main">
                            <label class="checkbox">
                                <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                                <span class="checkmark"></span>
                            </label>
                            <span class="task-title">${escapeHtml(task.title)}</span>
                            ${deadlineInfo ? `<span class="deadline-badge ${deadlineInfo.class}">${deadlineInfo.text}</span>` : ''}
                            <button class="task-expand ${task.expanded ? 'expanded' : ''}" onclick="toggleExpand(${task.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <button class="task-delete" onclick="deleteTask(${task.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="task-details ${task.expanded ? 'visible' : ''}">
                            <textarea class="details-textarea" placeholder="Add details..."
                                onchange="updateTaskDetails(${task.id}, 'details', this.value)">${escapeHtml(task.details || '')}</textarea>
                            <div class="meta-row">
                                <div class="deadline-input-group">
                                    <span class="deadline-label">Due:</span>
                                    <input type="date" class="deadline-input" value="${task.deadline || ''}"
                                        onchange="updateTaskDetails(${task.id}, 'deadline', this.value)">
                                </div>
                                <div class="add-tag-group">
                                    <input type="text" class="tag-input" id="tag-input-${task.id}" placeholder="Add tag..."
                                        onkeypress="if(event.key==='Enter'){event.preventDefault();addTag(${task.id})}">
                                </div>
                            </div>
                            ${task.tags && task.tags.length > 0 ? `
                                <div class="task-tags">
                                    ${task.tags.map(tag => `
                                        <span class="tag">
                                            ${escapeHtml(tag)}
                                            <button class="tag-remove" onclick="removeTag(${task.id}, '${escapeHtml(tag)}')">
                                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                                </svg>
                                            </button>
                                        </span>
                                    `).join('')}
                                </div>
                            ` : ''}
                            ${task.subtasks.length > 0 || task.expanded ? `
                                <div class="subtasks-section">
                                    ${task.subtasks.length > 0 ? `<div class="subtasks-label">Subtasks</div>` : ''}
                                    <div class="subtask-list">${subtasksHtml}</div>
                                </div>
                            ` : ''}
                            <div class="add-subtask-group">
                                <input type="text" class="subtask-input" id="subtask-input-${task.id}" placeholder="Add subtask..."
                                    onkeypress="if(event.key==='Enter'){event.preventDefault();addSubtask(${task.id})}">
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function initPinState() {
            if (window.electronAPI) {
                try {
                    const pinned = await window.electronAPI.getPinState();
                    updatePinUIFromState(pinned);
                } catch (e) {
                    updatePinUI();
                }
            } else {
                updatePinUI();
            }
        }

        document.getElementById('pinBtn').addEventListener('click', async () => {
            if (window.electronAPI) {
                try {
                    const pinned = await window.electronAPI.togglePin();
                    updatePinUIFromState(pinned);
                } catch (e) {
                    isPinned = !isPinned;
                    updatePinUI();
                }
            }
        });

        document.getElementById('minimizeBtn').addEventListener('click', () => {
            if (window.electronAPI) window.electronAPI.minimize();
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            if (window.electronAPI) window.electronAPI.close();
        });

        document.getElementById('autoStartBtn').addEventListener('click', async () => {
            if (window.electronAPI) {
                const enabled = await window.electronAPI.getAutoStart();
                await window.electronAPI.setAutoStart(!enabled);
                updateAutoStartUI(!enabled);
            }
        });

        function updateAutoStartUI(enabled) {
            const btn = document.getElementById('autoStartBtn');
            const icon = document.getElementById('autoStartIcon');
            if (enabled) {
                btn.classList.add('active');
                btn.title = 'Disable auto start';
                btn.style.color = '#ffffff';
                btn.style.background = '#333333';
                btn.style.borderRadius = '6px';
                if (icon) icon.innerHTML = '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>';
            } else {
                btn.classList.remove('active');
                btn.title = 'Enable auto start';
                btn.style.color = '#666666';
                btn.style.background = 'transparent';
                btn.style.borderRadius = '6px';
                if (icon) icon.innerHTML = '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>';
            }
        }

        async function initAutoStart() {
            if (window.electronAPI) {
                const enabled = await window.electronAPI.getAutoStart();
                updateAutoStartUI(enabled);
            }
        }

        function updatePinUIFromState(pinned) {
            const pinBtn = document.getElementById('pinBtn');
            const pinIcon = document.getElementById('pinIcon');
            if (pinned) {
                pinBtn.classList.add('active');
                pinBtn.title = 'Unpin window';
                if (pinIcon) pinIcon.innerHTML = '<path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/>';
            } else {
                pinBtn.classList.remove('active');
                pinBtn.title = 'Pin window';
                if (pinIcon) pinIcon.innerHTML = '<path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/>';
            }
        }

        initPinState();
        initAutoStart();
        render();
    </script>
</body>
</html>
