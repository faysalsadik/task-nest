<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasky - Notes Prototype</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --card: #111214;
            --card-hover: #1a1a1a;
            --border: #2a2a2a;
            --text: #b0b0b0;
            --text-muted: #888888;
            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --pin-active: #ffffff;
            --pin-inactive: #555555;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
            border: none;
            outline: none;
            margin: 0;
            padding: 0;
            position: relative;
        }

        html, body {
            background: var(--bg);
            border: none;
            outline: none;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .titlebar {
            height: 36px;
            background: var(--bg);
            display: flex;
            align-items: center;
            padding: 0 8px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .titlebar-right {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .app-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .titlebar-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: var(--text-muted);
        }

        .titlebar-btn:hover {
            background: var(--card);
        }

        .titlebar-btn.pin {
            color: var(--pin-inactive);
        }

        .titlebar-btn.pin.active {
            color: var(--pin-active);
        }

        .titlebar-btn.close:hover {
            background: #ffffff;
            color: black;
        }

        .titlebar-btn.notes:hover {
            color: var(--accent);
        }

        .titlebar-btn.notes.active {
            color: var(--accent);
            background: var(--card);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .task-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            padding: 10px 12px;
        }

        .task-input:focus {
            border-color: var(--text-muted);
        }

        .demo-tasks {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .demo-task {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--card);
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text);
        }

        .demo-check {
            width: 14px;
            height: 14px;
            border: 1.5px solid var(--text-muted);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.8rem;
        }

        /* ── Notes Panel ── */
        .notes-panel {
            position: absolute;
            top: 36px;
            left: -100%;
            width: 100%;
            height: calc(100% - 36px);
            background: var(--bg);
            transition: left 0.25s ease;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .notes-panel.open {
            left: 0;
        }

        .notes-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .back-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .back-btn:hover {
            background: var(--card);
            color: var(--text);
        }

        .notes-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
        }

        .btn-header-notes {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.75rem;
            padding: 5px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn-header-notes:hover {
            background: var(--card-hover);
            color: var(--accent);
        }

        .notes-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .note-form-wrap {
            display: none;
            margin-bottom: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
        }

        .note-form-wrap.open {
            display: block;
        }

        .note-form input,
        .note-form textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            padding: 8px 10px;
            margin-bottom: 8px;
        }

        .note-form input:focus,
        .note-form textarea:focus {
            border-color: var(--text-muted);
        }

        .note-form textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-add-note {
            width: 100%;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn-add-note:hover {
            background: var(--card-hover);
            border-color: var(--text-muted);
        }

        .date-group {
            margin-bottom: 16px;
        }

        .date-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 0 8px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .note-card {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 6px;
            transition: all 0.15s;
        }

        .note-card:hover {
            border-color: var(--text-muted);
        }

        .note-icon {
            flex-shrink: 0;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .note-content {
            flex: 1;
            min-width: 0;
        }

        .note-title-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 3px;
            word-wrap: break-word;
        }

        .note-body-text {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .note-time {
            font-size: 0.65rem;
            color: #555;
            margin-top: 4px;
        }

        .note-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .note-btn {
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            transition: all 0.15s;
        }

        .note-btn:hover {
            background: var(--card-hover);
        }

        .note-btn.delete:hover {
            color: #ff4444;
        }

        .note-btn.edit:hover {
            color: var(--accent);
        }

        .empty-notes {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-notes svg {
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-notes p {
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* ── Edit Note Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            padding: 8px 10px;
            margin-bottom: 10px;
        }

        .modal input:focus,
        .modal textarea:focus {
            border-color: var(--text-muted);
        }

        .modal textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-modal-cancel {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 7px 14px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-modal-cancel:hover {
            background: var(--card-hover);
        }

        .btn-modal-save {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 7px 14px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn-modal-save:hover {
            background: var(--card-hover);
            border-color: var(--text-muted);
        }

        .prototype-badge {
            position: fixed;
            bottom: 8px;
            right: 8px;
            font-size: 0.65rem;
            color: #444;
            background: var(--card);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            z-index: 200;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-left">
            <span class="app-title">Tasky</span>
        </div>
        <div class="titlebar-right">
            <button class="titlebar-btn pin active" id="pinBtn" title="Pin window">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/>
                </svg>
            </button>
            <button class="titlebar-btn notes" id="notesBtn" title="Notes">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="8" y1="13" x2="16" y2="13"/>
                    <line x1="8" y1="17" x2="16" y2="17"/>
                    <line x1="8" y1="9" x2="10" y2="9"/>
                </svg>
            </button>
            <button class="titlebar-btn" title="Auto start">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v10M18.36 6.64a9 9 0 1 1-12.73 0"/>
                </svg>
            </button>
            <button class="titlebar-btn" title="Projects">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <button class="titlebar-btn" title="Minimize">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button class="titlebar-btn close" title="Close">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="input-area">
            <input type="text" class="task-input" placeholder="Add a task..." disabled>
        </div>
        <div class="demo-tasks">
            <div class="demo-task">
                <div class="demo-check"></div>
                <span>Sample task (prototype)</span>
            </div>
            <div class="demo-task">
                <div class="demo-check"></div>
                <span>Click the notes icon <span style="color:var(--text-muted)">📄</span> in the titlebar</span>
            </div>
        </div>
    </div>

    <!-- Notes Panel -->
    <div class="notes-panel" id="notesPanel">
        <div class="notes-header">
            <button class="back-btn" id="backBtn" title="Back to tasks">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <span class="notes-title">Notes</span>
            <button class="btn-header-notes" id="newNoteBtn">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Note
            </button>
        </div>
        <div class="notes-body" id="notesBody">
            <div class="note-form-wrap" id="noteFormWrap">
                <div class="note-form">
                    <input type="text" id="noteTitleInput" placeholder="Note title..." maxlength="200">
                    <textarea id="noteContentInput" placeholder="Write your notes here..."></textarea>
                    <button class="btn-add-note" id="addNoteBtn">Save Note</button>
                </div>
            </div>
            <div id="notesList"></div>
        </div>
    </div>

    <!-- Edit Note Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-title">Edit Note</div>
            <input type="text" id="editTitle" placeholder="Note title...">
            <textarea id="editContent" placeholder="Write your notes here..."></textarea>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="cancelEditBtn">Cancel</button>
                <button class="btn-modal-save" id="saveEditBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="prototype-badge">PROTOTYPE — Notes Feature</div>

    <script>
        let notes = [];
        let editingNoteId = null;

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            const isToday = d.toDateString() === today.toDateString();
            const isYesterday = d.toDateString() === yesterday.toDateString();

            if (isToday) return 'Today';
            if (isYesterday) return 'Yesterday';

            return d.toLocaleDateString('en-US', {
                weekday: 'long',
                month: 'long',
                day: 'numeric',
                year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined
            }).replace(/,?\s*\d{4}$/, '').trim();
        }

        function formatTime(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function loadNotes() {
            try {
                notes = JSON.parse(localStorage.getItem('tasky_notes') || '[]');
            } catch (e) {
                notes = [];
            }
        }

        function saveNotes() {
            localStorage.setItem('tasky_notes', JSON.stringify(notes));
        }

        function renderNotes() {
            const list = document.getElementById('notesList');

            if (notes.length === 0) {
                list.innerHTML = `
                    <div class="empty-notes">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="8" y1="13" x2="16" y2="13"/>
                            <line x1="8" y1="17" x2="16" y2="17"/>
                        </svg>
                        <p>No notes yet. Click "New Note" to get started.</p>
                    </div>
                `;
                return;
            }

            const sorted = [...notes].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const groups = {};
            for (const note of sorted) {
                const dateKey = new Date(note.created_at).toDateString();
                if (!groups[dateKey]) groups[dateKey] = [];
                groups[dateKey].push(note);
            }

            let html = '';
            const dateKeys = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

            for (const dateKey of dateKeys) {
                const groupNotes = groups[dateKey];
                const displayDate = formatDate(groupNotes[0].created_at);
                html += `<div class="date-group"><div class="date-label">${displayDate}</div>`;

                for (const note of groupNotes) {
                    const title = note.title || 'Untitled';
                    const content = note.content || '';
                    html += `
                        <div class="note-card" data-id="${note.id}">
                            <div class="note-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="16" y1="13" x2="8" y2="13"/>
                                    <line x1="16" y1="17" x2="8" y2="17"/>
                                </svg>
                            </div>
                            <div class="note-content">
                                <div class="note-title-text">${escapeHtml(title)}</div>
                                ${content ? `<div class="note-body-text">${escapeHtml(content)}</div>` : ''}
                                <div class="note-time">${formatTime(note.created_at)}</div>
                            </div>
                            <div class="note-actions">
                                <button class="note-btn edit" onclick="editNote('${note.id}')" title="Edit note">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                                <button class="note-btn delete" onclick="deleteNote('${note.id}')" title="Delete note">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }

                html += '</div>';
            }

            list.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function addNote() {
            const titleInput = document.getElementById('noteTitleInput');
            const contentInput = document.getElementById('noteContentInput');
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title && !content) return;

            const note = {
                id: generateId(),
                title: title || 'Untitled',
                content: content || '',
                created_at: new Date().toISOString()
            };

            notes.push(note);
            saveNotes();
            renderNotes();

            titleInput.value = '';
            contentInput.value = '';

            const formWrap = document.getElementById('noteFormWrap');
            formWrap.classList.remove('open');
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveNotes();
            renderNotes();
        }

        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            editingNoteId = id;
            document.getElementById('editTitle').value = note.title === 'Untitled' ? '' : note.title;
            document.getElementById('editContent').value = note.content;
            document.getElementById('editModal').classList.add('open');
        }

        function saveEdit() {
            const title = document.getElementById('editTitle').value.trim();
            const content = document.getElementById('editContent').value.trim();

            const note = notes.find(n => n.id === editingNoteId);
            if (!note) return;

            note.title = title || 'Untitled';
            note.content = content || '';
            saveNotes();
            renderNotes();
            closeEditModal();
        }

        function closeEditModal() {
            editingNoteId = null;
            document.getElementById('editModal').classList.remove('open');
            document.getElementById('editTitle').value = '';
            document.getElementById('editContent').value = '';
        }

        function toggleNotesPanel() {
            const panel = document.getElementById('notesPanel');
            const btn = document.getElementById('notesBtn');
            panel.classList.toggle('open');
            btn.classList.toggle('active');
        }

        function toggleNoteForm() {
            const formWrap = document.getElementById('noteFormWrap');
            formWrap.classList.toggle('open');
            if (formWrap.classList.contains('open')) {
                document.getElementById('noteTitleInput').focus();
            }
        }

        // ── Event Listeners ──
        document.getElementById('notesBtn').addEventListener('click', toggleNotesPanel);
        document.getElementById('backBtn').addEventListener('click', toggleNotesPanel);
        document.getElementById('newNoteBtn').addEventListener('click', toggleNoteForm);
        document.getElementById('addNoteBtn').addEventListener('click', addNote);
        document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === document.getElementById('editModal')) closeEditModal();
        });

        document.getElementById('noteTitleInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('noteContentInput').focus();
            }
        });

        document.getElementById('noteContentInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                addNote();
            }
        });

        // ── Init ──
        loadNotes();
        renderNotes();
    </script>
</body>
</html>
